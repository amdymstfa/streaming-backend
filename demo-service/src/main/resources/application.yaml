server:
  port: 8085

spring:
  application:
    name: demo-service
  cloud:
    config:
      enabled: false

video:
  service:
    url: http://localhost:8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
