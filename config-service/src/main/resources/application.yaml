server:
  port: 8888

spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: file://${user.home}/streaming-backend/config-repo
          default-label: main
          clone-on-start: true

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
